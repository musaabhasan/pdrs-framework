services:
  app:
    build:
      context: .
    ports:
      - "8080:80"
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
      mailpit:
        condition: service_started
    volumes:
      - .:/var/www/html

  mysql:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_DATABASE: pdrs
      MYSQL_USER: pdrs
      MYSQL_PASSWORD: pdrs_dev_password
      MYSQL_ROOT_PASSWORD: root_dev_password
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/migrations:/docker-entrypoint-initdb.d:ro

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"
      - "1025:1025"

volumes:
  mysql_data:
